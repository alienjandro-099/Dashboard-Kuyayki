<!DOCTYPE html>
<html lang="es">
<head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --rojo:    #E01A3C;
            --amarillo:#FFD000;
            --azul:    #1565C0;
            --verde:   #1B8A4C;
            --naranja: #F4681B;
            --morado:  #7B1FA2;
            --celeste: #039BE5;
            --fondo:   #FFFBF2;
            --blanco:  #FFFFFF;
            --gris:    #F4F4F4;
            --texto:   #1A1A2E;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--fondo);

                radial-gradient(circle, rgba(255,208,0,.35) 2px, transparent 2px),

        /* ── LOADING OVERLAY ── */

            background: rgba(255,251,242,.93);

        .loading-sub   { font-size: .9rem; color: #888; margin-top: 6px; }

        /* ── HEADER ── */
        .header {

            padding: 22px 24px 18px;

        /* filter group */

            font-size: .72rem; font-weight: 800; color: var(--azul);

        /* ── TABLE CARD ── */

</head>
<body>

</div>

<!-- HEADER -->
<div class="header">

    <span class="header-corners right">🎪</span>

    <h2>📋 REPORTE – VISITA HOSPITALARIA MES</h2>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const URL_F1 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTcKt0v5H11947fOc1zdhujgFzIPTIbiUriiE2Bp-4rN517iFcvT87u0PB6592WFZZnx9yQxt9DJOQe/pub?gid=1820549015&single=true&output=csv';
const URL_F2 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2Jp4EiUUOpL7OxIYjb3KZji7ekS3oASySE-GC6hBeNxCE1OVp65ZMJ_TVSz9kYqfe1tTGBJ6PJT38/pub?gid=242877729&single=true&output=csv';
const REFRESH_MS = 12 * 60 * 60 * 1000;

const FECHA_REPLACEMENTS = {
    'Viernes 27 – Hospital Rebagliati (Neurología 13A) – 3:00 p.m.': 'Viernes 27 – Rebagliati Neurología – 2:00 p.m.',
    'Viernes 27 – Rebagliati Neurología – 3:00 p.m.':                'Viernes 27 – Rebagliati Neurología – 2:00 p.m.',
    'Viernes 24 – Rebagliati Neurología – 3:00 p.m.':                'Viernes 24 – Rebagliati Neurología – 2:00 p.m.',
    'Lunes 25 – Pasacalle Centro de Lima - 2:00 p.m.':                        'Lunes 25 – Pasacalle Centro de Lima - 10:00 a.m.',
    'Lunes 25 – Pasacalle Centro de Lima - 10:00 p.m.':                       'Lunes 25 – Pasacalle Centro de Lima - 10:00 a.m.',
};

const COLUMNS = [
    { key: 'fechaRegistro',  label: 'Fecha de Registro' },
    { key: 'dni',            label: 'DNI'               },
    { key: 'nombreCompleto', label: 'Nombre Completo'   },
    { key: 'payaso',         label: 'Payaso'            },
    { key: 'genero',         label: 'Género'            },
    { key: 'correo',         label: 'Correo'            },
    { key: 'celular',        label: 'Celular'           },
    { key: 'experiencia',    label: 'Experiencia'       },
    { key: 'mes',            label: 'Mes'               },
    { key: 'fechasAsistir',  label: 'Fechas Asistir'    },
];

// Orden cronológico de meses para ordenar el filtro MES
const MONTH_ORDER = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO',
                     'JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
const monthRank = m => { const i = MONTH_ORDER.indexOf((m||'').toUpperCase()); return i < 0 ? 99 : i; };

const FILTER_DEFS = [
    { key: 'dni',            label: 'DNI'               },
    { key: 'nombreCompleto', label: 'NOMBRE'            },
    { key: 'tipoRegistro2',  label: 'TIPO'              },
    { key: 'mes',            label: 'MES'               },
    { key: 'fechasAsistir',  label: 'FECHAS DISPONIBLES'},
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let allData      = [];
let activeFilters= {};
let nextRefresh  = null;

// ═══════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════
function norm(s) {
    if (!s) return '';
    return s.trim().toLowerCase()
             .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
             .replace(/[¿¡]/g, '');
}

function findCol(headers, terms) {
    for (const t of terms) {
        const nt = norm(t);
        const found = headers.find(h => {
            const nh = norm(h);
            return nh === nt || nh.includes(nt);
        });
        if (found !== undefined) return found;
    }
    return null;
}

function parseTS(str) {
    if (!str) return null;
    // ISO-like: "2026-01-08 20:44:29"
    let d = new Date(str);
    if (!isNaN(d)) return d;
    // DD/MM/YYYY HH:MM
    const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})[T ](\d{1,2}):(\d{2})/);
    if (m) return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5]);
    // M/D/YYYY HH:MM
    const m2 = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (m2) return new Date(+m2[3], +m2[1]-1, +m2[2]);
    return null;
}

function fmtDDMM(val) {
    const d = parseTS(val);
    if (!d) return val || '';
    return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}

function cleanPhone(raw) {
    if (!raw) return '';
    const digits = raw.replace(/[^0-9]/g, '');
    const d9 = digits.slice(-9);
    if (d9.length === 9) return '+51 ' + d9.slice(0,3) + ' ' + d9.slice(3,6) + ' ' + d9.slice(6);
    return raw.trim();
}

// ═══════════════════════════════════════════
//  FETCH CSV
// ═══════════════════════════════════════════
async function fetchCSV(url) {
    const resp = await fetch(url, { cache: 'no-cache' });
    const text = await resp.text();
    return new Promise((resolve, reject) => {
        Papa.parse(text, {
            header: false,
            skipEmptyLines: false,
            complete: r => resolve(r.data),
            error:    e => reject(e),
        });
    });
}

// ═══════════════════════════════════════════
//  PROCESS FUENTE 1
// ═══════════════════════════════════════════
function processF1(raw) {
    // Skip rows with < 4 non-empty cells (mirrors Power Query SkipRows)
    const valid = raw.filter(row => row.filter(c => c && c.trim()).length >= 4);
    if (valid.length < 2) return [];

    const headers = valid[0];
    const rows    = valid.slice(1);

    const iMarca = headers.indexOf(findCol(headers, ['Marca temporal']));
    const iMes   = headers.indexOf(findCol(headers, ['Mes de registro']));
    const iDNI   = headers.indexOf(findCol(headers, ['Ingresa tu DNI', 'INGRESA TU DNI']));
    const iExp   = headers.indexOf(findCol(headers, ['experiencia en hospitales', 'Experiencia']));

    // All fecha columns
    const fechaIdxs = headers.map((h,i) => ({ h, i }))
        .filter(x => norm(x.h).includes('cuales de las siguientes fechas') ||
                     norm(x.h).includes('fechas puedes asistir'));

    if (iMarca < 0 || iDNI < 0) return [];

    const get = (row, i) => (i >= 0 && i < row.length) ? (row[i] || '').trim() : '';

    // Determine max timestamp per DNI+Mes
    const maxTS = {};
    rows.forEach(row => {
        const dni = get(row, iDNI);
        const mes = get(row, iMes);
        if (!dni) return;
        const key = `${dni}||${mes}`;
        const ts  = parseTS(get(row, iMarca));
        if (!ts) return;
        if (!maxTS[key] || ts > maxTS[key]) maxTS[key] = ts;
    });

    const out = [];
    rows.forEach(row => {
        const dni = get(row, iDNI);
        if (!dni) return;

        const marcaStr = get(row, iMarca);
        const mes      = get(row, iMes).toUpperCase();
        const exp      = get(row, iExp);
        const key      = `${dni}||${get(row, iMes)}`;
        const ts       = parseTS(marcaStr);
        const tipo     = (ts && maxTS[key] && ts.getTime() === maxTS[key].getTime()) ? 'ACTUAL' : 'HISTÓRICO';

        // Combine all fecha columns
        const fechasRaw = fechaIdxs.map(x => get(row, x.i)).filter(Boolean).join(', ');

        // Split by comma, clean, replace
        const fechas = fechasRaw.split(',')
            .map(f => {
                const c = f.trim();
                return FECHA_REPLACEMENTS[c] || c;
            })
            .filter(Boolean);

        if (fechas.length === 0) return;

        fechas.forEach(fecha => {
            out.push({ marcaStr, mes, dni, exp, tipo, fecha });
        });
    });

    return out;
}

// ═══════════════════════════════════════════
//  PROCESS FUENTE 2 → lookup map
// ═══════════════════════════════════════════
function processF2(raw) {
    if (raw.length < 2) return {};

    const headers = raw[0];
    const rows    = raw.slice(1);

    const iMarca    = headers.indexOf(findCol(headers, ['Marca temporal']));
    const iDNI      = headers.indexOf(findCol(headers, ['INGRESA TU DNI', 'Ingresa tu DNI']));
    const iNomComp  = headers.indexOf(findCol(headers, ['Nombre Completo']));
    const iNombres  = headers.indexOf(findCol(headers, ['Nombres']));
    const iApPat    = headers.indexOf(findCol(headers, ['Apellido Paterno']));
    const iApMat    = headers.indexOf(findCol(headers, ['Apellido Materno']));
    const iArt      = headers.indexOf(findCol(headers, ['Nombre art', 'artistico', 'artístico']));
    const iGenero   = headers.indexOf(findCol(headers, ['nero', 'Genero']));
    const iCelular  = headers.indexOf(findCol(headers, ['WhatsApp', 'Celular', 'celular']));
    const iCorreo   = headers.indexOf(findCol(headers, ['Correo', 'correo']));

    if (iDNI < 0) return {};

    const get = (row, i) => (i >= 0 && i < row.length) ? (row[i] || '').trim() : '';

    // Max timestamp per DNI
    const maxTS = {};
    rows.forEach(row => {
        const dni = get(row, iDNI);
        if (!dni) return;
        const ts = parseTS(get(row, iMarca));
        if (!ts) return;
        if (!maxTS[dni] || ts > maxTS[dni]) maxTS[dni] = ts;
    });

    const lookup = {};
    rows.forEach(row => {
        const dni = get(row, iDNI);
        if (!dni) return;
        const ts = parseTS(get(row, iMarca));
        if (!ts || !maxTS[dni] || ts.getTime() !== maxTS[dni].getTime()) return;

        let nombre = get(row, iNomComp);
        if (!nombre) {
            const parts = [get(row, iNombres), get(row, iApPat), get(row, iApMat)];
            nombre = parts.filter(Boolean).map(s => s.toUpperCase()).join(' ');
        }

        lookup[dni] = {
            nombreCompleto: nombre,
            payaso:  get(row, iArt),
            genero:  get(row, iGenero),
            correo:  get(row, iCorreo),
            celular: cleanPhone(get(row, iCelular)),
        };
    });

    return lookup;
}

// ═══════════════════════════════════════════
//  BUILD REPORT ROWS
// ═══════════════════════════════════════════
function buildReport(f1, f2) {
    return f1.map(r => {
        const p = f2[r.dni] || {};
        return {
            fechaRegistro:  fmtDDMM(r.marcaStr),
            _ts:            r.marcaStr,
            dni:            r.dni,
            nombreCompleto: p.nombreCompleto || '',
            payaso:         p.payaso         || '',
            genero:         p.genero         || '',
            correo:         p.correo         || '',
            celular:        p.celular        || '',
            experiencia:    r.exp            || '',
            tipoRegistro2:  r.tipo,
            mes:            r.mes,
            fechasAsistir:  r.fecha,
        };
    });
}

// ═══════════════════════════════════════════
//  FILTERS – RENDER
// ═══════════════════════════════════════════
function renderFilters(data) {
    const grid = document.getElementById('filtersGrid');
    grid.innerHTML = '';

    FILTER_DEFS.forEach(fd => {
        // Filtros dependientes (cascada): los valores disponibles se calculan
        // sobre los datos ya filtrados por TODOS los demás filtros activos.
        const src = dataExcluding(fd.key);
        let values = [...new Set(src.map(r => r[fd.key]).filter(v => v !== '' && v != null))];
        if (fd.key === 'mes') values.sort((a, b) => monthRank(a) - monthRank(b));
        else                  values.sort((a, b) => String(a).localeCompare(String(b), 'es', { numeric: true }));
        const sel    = activeFilters[fd.key] || [];

        const optionsHTML = [
            `<div class="fdd-option all-opt">
                <input type="checkbox" id="all-${fd.key}" ${sel.length===0?'checked':''}
                       onchange="toggleAll('${fd.key}', this.checked)">
                <label for="all-${fd.key}" style="cursor:pointer">Seleccionar todo</label>
            </div>`,
            ...values.map((v, i) => {
                const checked = sel.length===0 || sel.includes(v);
                const vSafe   = escHtml(v);
                return `<div class="fdd-option">
                    <input type="checkbox" id="o-${fd.key}-${i}" value="${vSafe}"
                           ${checked?'checked':''} onchange="optChanged('${fd.key}')">
                    <label for="o-${fd.key}-${i}" style="cursor:pointer">${vSafe}</label>
                </div>`;
            }),
        ].join('');

        const labelText = getBtnLabel(fd.key);
        const badgeText = sel.length === 0 ? 'Todos' : sel.length;
        const badgeCls  = sel.length === 0 ? '' : 'active-filter';

        const div = document.createElement('div');
        div.className = 'filter-group';
        div.innerHTML = `
            <div class="filter-label">🎪 ${fd.label}</div>
            <button class="filter-btn" id="fbtn-${fd.key}" onclick="toggleDd('${fd.key}')">
                <span class="fbtn-label" id="flbl-${fd.key}">${escHtml(labelText)}</span>
                <span class="fbtn-badge ${badgeCls}" id="fbdg-${fd.key}">${badgeText}</span>
            </button>
            <div class="filter-dropdown" id="fdd-${fd.key}">
                <input class="fdd-search" type="text" placeholder="Buscar…"
                       oninput="searchFdd('${fd.key}', this.value)">
                <div class="fdd-options" id="fopts-${fd.key}">${optionsHTML}</div>
                <div class="fdd-footer">
                    <button class="btn-apply"   onclick="applyFilter('${fd.key}'); closeDd('${fd.key}')">Aplicar</button>
                    <button class="btn-clear-f" onclick="clearFilter('${fd.key}')">Limpiar</button>
                </div>
            </div>`;
        grid.appendChild(div);
    });
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getBtnLabel(key) {
    const sel = activeFilters[key];
    if (!sel || sel.length === 0) return 'Todos';
    if (sel.length === 1) return sel[0];
    return `${sel.length} seleccionados`;
}

function toggleDd(key) {
    const dd   = document.getElementById(`fdd-${key}`);
    const open = dd.classList.contains('open');
    closeAllDd();
    if (!open) {
        dd.classList.add('open');
        document.getElementById(`fbtn-${key}`).classList.add('active');
    }
}
function closeDd(key) {
    document.getElementById(`fdd-${key}`)?.classList.remove('open');
    document.getElementById(`fbtn-${key}`)?.classList.remove('active');
}
function closeAllDd() {
    document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
}

function searchFdd(key, q) {
    const lq = q.toLowerCase();
    document.querySelectorAll(`#fopts-${key} .fdd-option:not(.all-opt)`).forEach(el => {
        el.style.display = el.querySelector('label').textContent.toLowerCase().includes(lq) ? '' : 'none';
    });
}

function toggleAll(key, checked) {
    document.querySelectorAll(`#fopts-${key} input[type="checkbox"]:not([id^="all-"])`).forEach(cb => cb.checked = checked);
    if (checked) delete activeFilters[key];
    applyFilter(key);
}

function optChanged(key) {
    const all  = [...document.querySelectorAll(`#fopts-${key} input[type="checkbox"]:not([id^="all-"])`)];
    const allCk = all.every(cb => cb.checked);
    document.getElementById(`all-${key}`).checked = allCk;
}

function applyFilter(key) {
    const cbs  = [...document.querySelectorAll(`#fopts-${key} input[type="checkbox"]:not([id^="all-"])`)];
    const sel  = cbs.filter(cb => cb.checked).map(cb => cb.value);
    if (sel.length === cbs.length) {
        delete activeFilters[key];
    } else {
        activeFilters[key] = sel;
    }
    // Re-render para que los demás filtros se actualicen en cascada
    renderFilters(allData);
    renderTable(filtered());
    // Reabrir el dropdown que el usuario estaba usando
    toggleDd(key);
}

function clearFilter(key) {
    delete activeFilters[key];
    renderFilters(allData);   // re-render to reset checkboxes
    closeDd(key);
    renderTable(filtered());
}

function clearAllFilters() {
    FILTER_DEFS.forEach(fd => delete activeFilters[fd.key]);
    renderFilters(allData);
    renderTable(allData);
}

function refreshBadge(key) {
    const sel   = activeFilters[key];
    const badge = document.getElementById(`fbdg-${key}`);
    const label = document.getElementById(`flbl-${key}`);
    if (!badge) return;
    if (!sel || sel.length === 0) {
        badge.textContent = 'Todos'; badge.className = 'fbtn-badge';
        label.textContent = 'Todos';
    } else {
        badge.textContent = sel.length; badge.className = 'fbtn-badge active-filter';
        label.textContent = sel.length === 1 ? sel[0] : `${sel.length} seleccionados`;
    }
}

function filtered() {
    return allData.filter(row =>
        FILTER_DEFS.every(fd => {
            const sel = activeFilters[fd.key];
            return !sel || sel.length === 0 || sel.includes(row[fd.key]);
        })
    );
}

// Datos filtrados por todos los filtros activos EXCEPTO 'exceptKey'.
// Sirve para calcular las opciones disponibles de cada filtro en cascada.
function dataExcluding(exceptKey) {
    return allData.filter(row =>
        FILTER_DEFS.every(fd => {
            if (fd.key === exceptKey) return true;
            const sel = activeFilters[fd.key];
            return !sel || sel.length === 0 || sel.includes(row[fd.key]);
        })
    );
}

// ═══════════════════════════════════════════
//  TABLE – RENDER
// ═══════════════════════════════════════════
function initHeaders() {
    document.getElementById('tableHeaders').innerHTML =
        COLUMNS.map(c => `<th>${c.label}</th>`).join('');
}

function renderTable(data) {
    document.getElementById('shownCount').textContent = data.length;
    document.getElementById('totalCount').textContent = allData.length;
    document.getElementById('hTotalReg').textContent  = `${allData.length} registros totales`;

    const tbody = document.getElementById('tableBody');
    if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${COLUMNS.length}" class="no-results">
            <div class="nr-emoji">🤡</div>
            <p>Sin resultados para los filtros seleccionados</p>
        </td></tr>`;
        return;
    }

    tbody.innerHTML = data.map(row => {
        const expNorm = norm(row.experiencia);
        const expB  = expNorm.startsWith('s') ? 'b-si' : (expNorm.startsWith('n') ? 'b-no' : '');
        return `<tr>
            <td class="fecha-reg">${escHtml(row.fechaRegistro)}</td>
            <td class="dni-cell">${escHtml(row.dni)}</td>
            <td class="nombre-cell">${escHtml(row.nombreCompleto)}</td>
            <td class="payaso-cell">${row.payaso ? escHtml(row.payaso) : '<em style="color:#ccc">—</em>'}</td>
            <td>${escHtml(row.genero) || '—'}</td>
            <td><small>${escHtml(row.correo) || '—'}</small></td>
            <td><small>${escHtml(row.celular) || '—'}</small></td>
            <td>${row.experiencia && expB ? `<span class="badge ${expB}">${escHtml(row.experiencia)}</span>` : (escHtml(row.experiencia) || '—')}</td>
            <td><span class="badge b-mes">${escHtml(row.mes)}</span></td>
            <td class="fecha-asistir">${escHtml(row.fechasAsistir)}</td>
        </tr>`;
    }).join('');
}

// ═══════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════
async function loadData() {
    const overlay    = document.getElementById('loadingOverlay');
    const errorBox   = document.getElementById('errorBox');
    const filterPanel= document.getElementById('filtersPanel');
    const tableCard  = document.getElementById('tableCard');

    overlay.classList.remove('hidden');
    errorBox.style.display = 'none';

    try {
        const [rawF1, rawF2] = await Promise.all([fetchCSV(URL_F1), fetchCSV(URL_F2)]);

        const f1 = processF1(rawF1);
        const f2 = processF2(rawF2);
        allData  = buildReport(f1, f2);

        // ── DEFAULT FILTERS ──
        // TIPO = ACTUAL
        activeFilters['tipoRegistro2'] = ['ACTUAL'];

        // MES = último mes (orden cronológico) con registros ACTUAL.
        // Ej.: si existen ENERO, MARZO y JUNIO → por defecto JUNIO.
        const mesesActual = [...new Set(
            allData.filter(r => r.tipoRegistro2 === 'ACTUAL' && r.mes).map(r => r.mes)
        )];
        let lastMes = null;
        if (mesesActual.length) {
            lastMes = mesesActual.reduce((best, m) => monthRank(m) > monthRank(best) ? m : best, mesesActual[0]);
        }
        if (lastMes) activeFilters['mes'] = [lastMes];

        filterPanel.style.display = 'block';
        tableCard.style.display   = 'block';

        initHeaders();
        renderFilters(allData);
        renderTable(filtered());

        const now = new Date();
        document.getElementById('hLastUpdate').textContent =
            'Actualizado: ' + now.toLocaleDateString('es-PE') + ' ' +
            now.toLocaleTimeString('es-PE', { hour:'2-digit', minute:'2-digit' });

        nextRefresh = new Date(now.getTime() + REFRESH_MS);
        updateCountdown();

    } catch (err) {
        console.error(err);
        const errDetail = document.getElementById('errDetail');
        if (errDetail) errDetail.textContent = err.message || String(err);
        errorBox.style.display  = 'block';
        filterPanel.style.display = 'none';
        tableCard.style.display   = 'none';
    } finally {
        overlay.classList.add('hidden');
    }
}

function updateCountdown() {
    if (!nextRefresh) return;
    const diff = nextRefresh - new Date();
    if (diff <= 0) { loadData(); return; }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const txt = `⏱ Próxima actualización automática en ${h}h ${m}m`;
    document.getElementById('refreshFooter').textContent = txt;
    document.getElementById('hNextRefresh').textContent  = `Próxima actualización: ${h}h ${m}m`;
}

// Close dropdowns on outside click
document.addEventListener('click', e => {
    if (!e.target.closest('.filter-group')) closeAllDd();
});

// Auto-refresh
setInterval(loadData, REFRESH_MS);
setInterval(updateCountdown, 60_000);

initHeaders();
loadData();
</script>
</body>
